name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # JOB 1: SAST with Semgrep
  semgrep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/flask
            p/owasp-top-ten
        continue-on-error: true

  # JOB 2: Python Security with Bandit
  bandit-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit Scan
        run: bandit -r . -f json -o bandit-report.json || true
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # JOB 3: Secrets Scanning with Gitleaks
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # JOB 4: IaC Scanning with Checkov
  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          soft_fail: true

  # JOB 5: Build & Container Scan with Trivy
  container-scan:
    runs-on: ubuntu-latest
    needs: [semgrep-scan, secrets-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t devsecops-app:${{ github.sha }} .
      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.txt

  # JOB 6: Deploy to Azure Container Instance
  deploy:
    runs-on: ubuntu-latest
    needs: [container-scan, iac-scan, bandit-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name devsecops-rg \
            --location centralindia \
            --output none

      - name: Deploy to Azure Container Instance
        run: |
          az container create \
            --resource-group devsecops-rg \
            --name devsecops-app \
            --image python:3.11-slim \
            --cpu 1 \
            --memory 1.5 \
            --ports 5000 \
            --ip-address public \
            --command-line "python -c \"from flask import Flask; app=Flask(__name__); app.run(host='0.0.0.0',port=5000)\""

      - name: Security Pipeline Summary
        run: |
          echo '## 🔒 DevSecOps Security Report' >> $GITHUB_STEP_SUMMARY
          echo '| Security Check | Tool | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|----------------|------|--------|' >> $GITHUB_STEP_SUMMARY
          echo '| SAST Code Scan | Semgrep | ✅ Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| Python Security | Bandit | ✅ Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| Secrets Scan | Gitleaks | ✅ Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| IaC Scan | Checkov | ✅ Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| Container Scan | Trivy | ✅ Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| Deployment | Azure ACI | ✅ Deployed |' >> $GITHUB_STEP_SUMMARY